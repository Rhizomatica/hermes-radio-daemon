; hermes-radio-daemon hardware / radio configuration
; Place this file at /etc/hermes/radio.ini  (or pass -r <path>)

[main]

; Radio backend selection.
;   hamlib     native hermes-radio-daemon backend
;   hfsignals  bootstrap the copied legacy_sbitx stack in-process so all
;              legacy sBitx/zBitx features and the original ALSA/DSP path stay intact
;              This is the migration path for old sbitx_controller deployments.
radio_backend = hamlib

; Compatibility-only knob kept during the migration away from exec delegation.
; Embedded hfsignals mode ignores this and always uses the vendored legacy_sbitx stack.
hfsignals_controller_path = sbitx_controller

; Hamlib rig model number.
; The alias `hamlib_model` is also accepted.
; Use 1 for the "Dummy" (software test) rig.
; For a full list run:  rigctl -l
; Common examples:
;   1       Hamlib Dummy
;   3       Hamlib NET rigctl (rigctld)
;   120     Kenwood TS-480
;   3011    Icom IC-7300
;   3020    Icom IC-9700
radio_model = 1

; Serial port path (or hostname:port for networked rigs / rigctld)
; The alias `rig_path` is also accepted.
; Examples:
;   /dev/ttyUSB0      (USB serial adapter)
;   /dev/ttyS0        (built-in serial port)
;   localhost:4532    (rigctld network)
rig_pathname = /dev/ttyUSB0

; Serial baud rate (ignored for network rigs)
serial_rate = 9600

; PTT control type (numeric values or symbolic names like RIG / SERIAL_RTS):
;   0  PTT_NONE        – no PTT (RX only)
;   1  PTT_RIG         – PTT via CAT command
;   2  PTT_SERIAL_RTS  – PTT via serial port RTS line
;   3  PTT_SERIAL_DTR  – PTT via serial port DTR line
;   4  PTT_PARALLEL    – PTT via parallel port
;   5  PTT_CM108       – PTT via CM108 USB GPIO
;   6  PTT_GPIO        – PTT via Linux GPIO
;   7  PTT_RIG_MICDATA – PTT via rig mic data port
; The alias `ptt_mode` is also accepted.
ptt_type = RIG

; PTT device path (only needed when ptt_type is not 0 or 1)
; Leave empty to reuse rig_pathname for serial RTS/DTR control
ptt_pathname =

; Serial number of this station (informational, e.g. used by hermes-net)
serial_number = 0

; SWR protection threshold: vswr * 10  (e.g. 25 = SWR 2.5)
; Set to 0 to disable SWR protection
reflected_threshold = 25

; Enable the SHM control interface used by sbitx_client
enable_shm_control = 1

; Enable websocket support.
; hamlib backend:
;   plain WS control/media server bound by websocket_bind.
; hfsignals backend:
;   keeps the embedded legacy HTTPS/WSS web UI/status server on its legacy path;
;   websocket_bind below is ignored there.
; Binary stream types on the hamlib path:
;   0x01  RX audio from daemon to clients, and TX audio from clients to daemon
;   0x02  RX spectrum / waterfall bins from daemon to clients
;   0x03  TX spectrum / waterfall bins from daemon to clients
enable_websocket = 0
websocket_bind = 0.0.0.0:8080

; Optional Hamlib ALSA media bridge.
; When enabled, capture_device audio is published to websocket clients and can
; also be recorded. TX audio received over websocket is written to
; playback_device and can be recorded too.
; The hfsignals backend keeps using the vendored legacy_sbitx ALSA backend
; instead of using this bridge, so these settings are hamlib-only in practice.
enable_audio_bridge = 0
capture_device = default
playback_device = default
audio_sample_rate = 8000
audio_period_size = 160
audio_queue_samples = 16000

; Output directory for daemon-managed WAV recordings on the hamlib path.
; The daemon creates this directory if its parent already exists and is writable.
recording_dir = /var/lib/hermes-radio-daemon

; BFO offset in Hz (kept for API compatibility; not used with Hamlib radios)
bfo = 0
