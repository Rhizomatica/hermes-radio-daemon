; hermes-radio-daemon hardware / radio configuration
; Place this file at /etc/hermes/radio.ini  (or pass -r <path>)

[main]

; Hamlib rig model number.
; Use 1 for the "Dummy" (software test) rig.
; For a full list run:  rigctl -l
; Common examples:
;   1       Hamlib Dummy
;   3       Hamlib NET rigctl (rigctld)
;   120     Kenwood TS-480
;   3011    Icom IC-7300
;   3020    Icom IC-9700
radio_model = 1

; Serial port path (or hostname:port for networked rigs / rigctld)
; Examples:
;   /dev/ttyUSB0      (USB serial adapter)
;   /dev/ttyS0        (built-in serial port)
;   localhost:4532    (rigctld network)
rig_pathname = /dev/ttyUSB0

; Serial baud rate (ignored for network rigs)
serial_rate = 9600

; PTT control type:
;   0  PTT_NONE        – no PTT (RX only)
;   1  PTT_RIG         – PTT via CAT command
;   2  PTT_SERIAL_RTS  – PTT via serial port RTS line
;   3  PTT_SERIAL_DTR  – PTT via serial port DTR line
;   4  PTT_PARALLEL    – PTT via parallel port
;   5  PTT_CM108       – PTT via CM108 USB GPIO
;   6  PTT_GPIO        – PTT via Linux GPIO
;   7  PTT_RIG_MICDATA – PTT via rig mic data port
ptt_type = 1

; PTT device path (only needed when ptt_type is not 0 or 1)
; Leave empty to use the same port as rig_pathname
ptt_pathname =

; Serial number of this station (informational, e.g. used by hermes-net)
serial_number = 0

; SWR protection threshold: vswr * 10  (e.g. 25 = SWR 2.5)
; Set to 0 to disable SWR protection
reflected_threshold = 25

; Enable the SHM control interface used by sbitx_client
enable_shm_control = 1

; BFO offset in Hz (kept for API compatibility; not used with Hamlib radios)
bfo = 0
