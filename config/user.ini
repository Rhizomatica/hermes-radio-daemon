; hermes-radio-daemon user / profile configuration
; Place this file at /etc/hermes/user.ini  (or pass -u <path>)

[main]
; Index of the profile that is active at startup
current_profile = 0

; Index of the profile to return to after a timeout
default_profile = 0

; Seconds of inactivity before returning to the default profile.
; Set to -1 to disable the timeout.
default_profile_fallback_timeout = -1

; Frequency tuning step in Hz (used by front-panel encoders if present)
step_size = 100

; ----------------------------------------------------------------
; Profile definitions
; Add additional [profile1], [profile2], … sections as needed.
; The daemon supports up to 4 profiles (MAX_RADIO_PROFILES).
; ----------------------------------------------------------------

[profile0]
; Operating frequency in Hz
freq = 7050000

; Mode: USB | LSB | CW
mode = USB

; RF power output level as a percentage (0–100)
power_level_percentage = 100

; Speaker / audio output level (0–100, informational)
speaker_level = 50

; AGC: OFF | SLOW | MEDIUM | FAST
agc = OFF

; Compressor: OFF | ON
compressor = OFF

; Enable digital voice (VARA / Codec2) mode for this profile
digital_voice = 0

[profile1]
freq = 14200000
mode = USB
power_level_percentage = 100
speaker_level = 50
agc = SLOW
compressor = OFF
digital_voice = 0
